<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauczyciel Słówek</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">
        <h1>Nauczyciel Słówek</h1>

        <div id="setup-section">
            <div class="card">
                <label>1. Wybierz plik słówka.txt:</label>
                <input type="file" id="file-input" accept=".txt">
                
                <label>2. Wybierz tryb i rozpocznij:</label>
                <div class="vertical-buttons">
                    <button id="start-word-def-btn">Słówko -> Tłumaczenie</button>
                    <button id="start-def-word-btn">Tłumaczenie -> Słówko</button>
                </div>
            </div>
        </div>

        <div id="quiz-section" class="hidden">
            <div class="card">
                <div class="progress">Słówko <span id="current-idx">1</span> z <span id="total-idx">0</span></div>
                <div id="question-display"></div>
                <input type="text" id="answer-input" placeholder="Wpisz odpowiedź..." autocomplete="off">
                <div class="button-group">
                    <button id="check-btn">Sprawdź</button>
                    <button id="next-btn" class="hidden btn-success">Dalej</button>
                    <button id="reset-btn" class="btn-danger">Resetuj</button>
                </div>
                <div id="feedback"></div>
            </div>
        </div>

        <div id="result-section" class="hidden">
            <div class="card result-card">
                <h2>Koniec nauki!</h2>
                <div class="score-box">
                    Twój wynik: <span id="percentage">0</span>%
                </div>
                <p>Poprawne odpowiedzi: <span id="correct-count">0</span> / <span id="total-count">0</span></p>
                
                <div class="table-container">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Słówko / Definicja</th>
                                <th>Twoja odpowiedź</th>
                                <th>Poprawna odpowiedź</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body">
                        </tbody>
                    </table>
                </div>

                <div class="restart-section">
                    <h3>Zacznij od nowa (Losuj ponownie):</h3>
                    <div class="vertical-buttons">
                        <button id="restart-word-def-btn">Tryb: Słówko -> Tłumaczenie</button>
                        <button id="restart-def-word-btn">Tryb: Tłumaczenie -> Słówko</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        
        // Setup buttons
        const startWordDefBtn = document.getElementById('start-word-def-btn');
        const startDefWordBtn = document.getElementById('start-def-word-btn');
        
        // Quiz buttons
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        // Restart buttons
        const restartWordDefBtn = document.getElementById('restart-word-def-btn');
        const restartDefWordBtn = document.getElementById('restart-def-word-btn');
        
        // Sections & Elements
        const setupSection = document.getElementById('setup-section');
        const quizSection = document.getElementById('quiz-section');
        const resultSection = document.getElementById('result-section');
        const questionDisplay = document.getElementById('question-display');
        const answerInput = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');
        const resultsTableBody = document.getElementById('results-table-body');

        let wordsData = [];
        let answerHistory = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let mode = 'word-to-def';

        function handleSetupStart(selectedMode) {
            const file = fileInput.files[0];
            if (!file) {
                alert("Proszę wybrać plik .txt");
                return;
            }

            mode = selectedMode;
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const text = e.target.result;
                parseFile(text);
                if (wordsData.length > 0) {
                    startQuiz();
                } else {
                    alert("Plik jest pusty lub ma błędny format.");
                }
            };
            reader.readAsText(file);
        }

        startWordDefBtn.addEventListener('click', () => handleSetupStart('word-to-def'));
        startDefWordBtn.addEventListener('click', () => handleSetupStart('def-to-word'));

        function parseFile(text) {
            const lines = text.split('\n');
            wordsData = lines.map(line => {
                const parts = line.split(' - ');
                if (parts.length === 2) {
                    return {
                        word: parts[0].replace(/"/g, '').trim(),
                        def: parts[1].replace(/"/g, '').trim()
                    };
                }
                return null;
            }).filter(item => item !== null);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            shuffleArray(wordsData);
            
            setupSection.classList.add('hidden');
            resultSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            
            currentIndex = 0;
            correctAnswers = 0;
            answerHistory = [];
            showQuestion();
        }

        resetBtn.addEventListener('click', startQuiz);

        restartWordDefBtn.addEventListener('click', () => {
            mode = 'word-to-def';
            startQuiz();
        });

        restartDefWordBtn.addEventListener('click', () => {
            mode = 'def-to-word';
            startQuiz();
        });

        function showQuestion() {
            feedback.textContent = '';
            answerInput.value = '';
            answerInput.disabled = false;
            answerInput.focus();
            
            checkBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            
            document.getElementById('current-idx').textContent = currentIndex + 1;
            document.getElementById('total-idx').textContent = wordsData.length;

            const currentPair = wordsData[currentIndex];
            questionDisplay.textContent = mode === 'word-to-def' ? currentPair.word : currentPair.def;
        }

        checkBtn.addEventListener('click', handleAnswer);
        nextBtn.addEventListener('click', goToNext);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!checkBtn.classList.contains('hidden')) {
                    handleAnswer();
                } else if (!nextBtn.classList.contains('hidden')) {
                    goToNext();
                }
            }
        });

        function handleAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            const currentPair = wordsData[currentIndex];
            const correctAnswer = mode === 'word-to-def' ? currentPair.def.toLowerCase() : currentPair.word.toLowerCase();
            const questionText = mode === 'word-to-def' ? currentPair.word : currentPair.def;

            const isCorrect = userAnswer === correctAnswer;

            answerHistory.push({
                question: questionText,
                userAnswer: userAnswer || '(brak)',
                correctAnswer: correctAnswer,
                isCorrect: isCorrect
            });

            if (isCorrect) {
                correctAnswers++;
                feedback.textContent = "Dobrze!";
                feedback.className = "success";
            } else {
                feedback.textContent = `Błąd. Poprawna odpowiedź to: ${correctAnswer}`;
                feedback.className = "error";
            }

            answerInput.disabled = true;
            checkBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            nextBtn.focus();
        }

        function goToNext() {
            currentIndex++;
            if (currentIndex < wordsData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            const percent = Math.round((correctAnswers / wordsData.length) * 100);
            document.getElementById('percentage').textContent = percent;
            document.getElementById('correct-count').textContent = correctAnswers;
            document.getElementById('total-count').textContent = wordsData.length;

            resultsTableBody.innerHTML = '';
            answerHistory.forEach(item => {
                const tr = document.createElement('tr');
                const userAnsClass = item.isCorrect ? 'text-success' : 'text-danger';
                
                tr.innerHTML = `
                    <td>${item.question}</td>
                    <td class="${userAnsClass}">${item.userAnswer}</td>
                    <td class="text-success">${item.correctAnswer}</td>
                `;
                resultsTableBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
